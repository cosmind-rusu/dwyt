<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dwyt — Download YouTube to MP3</title>
    <style>
        :root {
            --bg: #0f0f11;
            --surface: #1a1a1e;
            --surface2: #252529;
            --border: #333336;
            --accent: #e84040;
            --accent-hover: #ff5555;
            --text: #e8e8ea;
            --text-dim: #88889a;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 640px;
            width: 100%;
            padding: 2rem 1rem;
        }
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        header h1 span { color: var(--accent); }
        header p {
            color: var(--text-dim);
            margin-top: 0.4rem;
            font-size: 0.95rem;
        }

        /* ── Form ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .input-group {
            display: flex;
            gap: 0.5rem;
        }
        .input-group input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent);
        }
        .input-group input::placeholder {
            color: var(--text-dim);
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Status / Progress ── */
        #status {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        #status.info {
            display: block;
            background: rgba(59, 130, 246, 0.12);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }
        #status.success {
            display: block;
            background: rgba(34, 197, 94, 0.12);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.25);
        }
        #status.error {
            display: block;
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }
        #status.progress {
            display: block;
            background: rgba(234, 179, 8, 0.12);
            color: #facc15;
            border: 1px solid rgba(234, 179, 8, 0.25);
        }
        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── History ── */
        #history {
            margin-top: 0.5rem;
        }
        #history h3 {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            background: var(--surface2);
            margin-bottom: 0.4rem;
            gap: 0.5rem;
        }
        .history-item .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.88rem;
        }
        .history-item .meta {
            color: var(--text-dim);
            font-size: 0.78rem;
            white-space: nowrap;
        }
        .history-item .btn-small {
            padding: 0.3rem 0.7rem;
            font-size: 0.78rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: 0.2s;
        }
        .history-item .btn-small:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .empty-history {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: center;
            padding: 1.5rem;
        }
        .history-loading {
            text-align: center;
            color: var(--text-dim);
            padding: 1rem;
        }

        footer {
            margin-top: 3rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <h1><span>dw</span>yt</h1>
        <p>Pega un enlace de YouTube y descarga el audio en MP3</p>
    </header>

    <div class="card">
        <form id="dw-form" autocomplete="off">
            <div class="input-group">
                <input
                    type="text"
                    id="url-input"
                    placeholder="https://youtube.com/watch?v=..."
                    required
                >
                <button type="submit" class="btn btn-primary" id="submit-btn">
                    Descargar
                </button>
            </div>
        </form>

        <div id="status"></div>
    </div>

    <div id="history">
        <h3>Descargas recientes</h3>
        <div id="history-list">
            <div class="history-loading">Cargando…</div>
        </div>
    </div>

    <footer>
        dwyt — solo para uso personal. Respeta los derechos de autor.
    </footer>
</div>

<script>
const form = document.getElementById('dw-form');
const urlInput = document.getElementById('url-input');
const submitBtn = document.getElementById('submit-btn');
const statusDiv = document.getElementById('status');
const historyList = document.getElementById('history-list');

// ── Status helpers ──
function setStatus(msg, type) {
    statusDiv.className = type || 'info';
    statusDiv.textContent = '';
    if (type === 'progress') {
        const sp = document.createElement('span');
        sp.className = 'spinner';
        statusDiv.appendChild(sp);
        statusDiv.appendChild(document.createTextNode(msg));
    } else {
        statusDiv.textContent = msg;
    }
}

function clearStatus() {
    statusDiv.className = '';
    statusDiv.style.display = 'none';
}

// ── Submit ──
form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const url = urlInput.value.trim();
    if (!url) return;

    submitBtn.disabled = true;
    setStatus('Descargando y convirtiendo a MP3…', 'progress');

    try {
        // Use XMLHttpRequest to detect download
        const resp = await fetch('/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'url=' + encodeURIComponent(url),
        });

        if (!resp.ok) {
            const err = await resp.json().catch(() => ({ error: 'Error del servidor' }));
            setStatus(err.error || 'Error desconocido', 'error');
            submitBtn.disabled = false;
            return;
        }

        // It's a file download — get blob and trigger download
        const blob = await resp.blob();
        const contentDisp = resp.headers.get('Content-Disposition') || '';
        const filename = contentDisp.includes('filename=')
            ? decodeURIComponent(contentDisp.split('filename=')[1].split(';')[0].replace(/"/g, '').trim())
            : 'audio.mp3';

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);

        setStatus(`✅ ${filename} descargado`, 'success');
        urlInput.value = '';
        loadHistory();

    } catch (err) {
        setStatus('Error de conexión: ' + err.message, 'error');
    }

    submitBtn.disabled = false;
});

// ── History ──
async function loadHistory() {
    try {
        const resp = await fetch('/history');
        const items = await resp.json();
        if (items.length === 0) {
            historyList.innerHTML = '<div class="empty-history">Aún no hay descargas</div>';
            return;
        }
        historyList.innerHTML = items.map(item => `
            <div class="history-item">
                <span class="name" title="${item.name.replace(/"/g, '&quot;')}">${escapeHtml(item.name)}</span>
                <span class="meta">${item.size} MB · ${item.date}</span>
            </div>
        `).join('');
    } catch {
        historyList.innerHTML = '<div class="empty-history">No se pudo cargar el historial</div>';
    }
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

// Load history on page load
loadHistory();
</script>
</body>
</html>
